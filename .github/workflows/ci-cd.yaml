name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Lint backend
        working-directory: backend
        run: |
          npm ci
          npm run lint --if-present

      - name: Lint frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint --if-present

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint worker (flake8)
        working-directory: worker
        run: |
          pip install flake8
          flake8 . --max-line-length=110

  build-and-push:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/ai-task-backend:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/ai-task-backend:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push worker
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/ai-task-worker:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/ai-task-worker:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/ai-task-frontend:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/ai-task-frontend:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-infra-repo:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: YOUR_GH_USERNAME/ai-task-platform-infra
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Bump image tags for staging overlay
        working-directory: infra/k8s-kustomize/overlays/staging
        run: |
          kustomize edit set image \
            YOUR_DOCKERHUB_USERNAME/ai-task-backend=${{ env.DOCKERHUB_NAMESPACE }}/ai-task-backend:${{ needs.build-and-push.outputs.image_tag }} \
            YOUR_DOCKERHUB_USERNAME/ai-task-worker=${{ env.DOCKERHUB_NAMESPACE }}/ai-task-worker:${{ needs.build-and-push.outputs.image_tag }} \
            YOUR_DOCKERHUB_USERNAME/ai-task-frontend=${{ env.DOCKERHUB_NAMESPACE }}/ai-task-frontend:${{ needs.build-and-push.outputs.image_tag }}

      - name: Commit and push updated manifests
        working-directory: infra
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "ci: bump staging images to ${{ needs.build-and-push.outputs.image_tag }}"
          git push
        # Argo CD's auto-sync (selfHeal + automated) picks this commit up
        # within its poll interval (default 3m) and applies it — no manual
        # kubectl apply step needed. This is the "GitOps" part.
