apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-task-platform-config
  namespace: ai-task-platform
data:
  PORT: "5000"
  TASK_QUEUE_KEY: "ai_task_queue"
  JWT_EXPIRES_IN: "7d"
  MONGO_URI: "mongodb://mongo:27017/ai_task_platform"
  REDIS_URL: "redis://redis:6379"
  CORS_ORIGIN: "https://ai-tasks.example.com"
