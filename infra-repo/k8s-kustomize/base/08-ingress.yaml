apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-task-platform-ingress
  namespace: ai-task-platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["ai-tasks.example.com"]
      secretName: ai-task-platform-tls
  rules:
    - host: ai-tasks.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service: { name: backend, port: { number: 5000 } }
          - path: /
            pathType: Prefix
            backend:
              service: { name: frontend, port: { number: 80 } }
