apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai-task-platform
resources:
  - 00-namespace.yaml
  - 01-configmap.yaml
  - 02-secrets.yaml
  - 03-mongo.yaml
  - 04-redis.yaml
  - 05-backend.yaml
  - 06-worker.yaml
  - 07-frontend.yaml
  - 08-ingress.yaml
images:
  - name: YOUR_DOCKERHUB_USERNAME/ai-task-backend
    newTag: latest
  - name: YOUR_DOCKERHUB_USERNAME/ai-task-worker
    newTag: latest
  - name: YOUR_DOCKERHUB_USERNAME/ai-task-frontend
    newTag: latest
